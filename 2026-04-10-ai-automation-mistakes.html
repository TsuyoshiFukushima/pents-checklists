<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI業務自動化スタートチェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI業務自動化スタートチェックリスト</h1>
            <p class="subtitle">「初回から失敗しない」ための19の確認ポイント</p>
        </header>

        <div class="progress-text" id="progressText">0 / 19 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】課金・開始前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自動化したいタスクを1つだけ絞る（複数同時はNG）</span>
<span class="advice-text">「まず全自動化」は最大の失敗原因。1タスクに集中することで成功体験が生まれ、次のステップへの足がかりができます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">そのタスクの手順を箇条書きで書き出す（5〜10ステップ程度）</span>
<span class="advice-text">人が行う手順を言語化することで、AIへの指示文（プロンプト）が格段に作りやすくなります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">使用するツールの無料プランで試験稼働する</span>
<span class="advice-text">ChatGPT無料版、n8nクラウド無料枠、Make無料プランなど、まずコストゼロで動作確認します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月次の処理件数を概算する</span>
<span class="advice-text">月に何件処理するかを計算し、各ツールの無料プラン上限（各サービスの公式ページで確認）と比較します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">エラー通知先（Slack・メール）を事前に決めておく</span>
<span class="advice-text">フローが止まっても気づけるよう、エラー通知先を先に決めておくことが大前提です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AI APIを使う場合は利用上限（月額上限）を設定する</span>
<span class="advice-text">ChatGPT API・Claude APIは従量課金です。利用上限を設定しないと、予想外の料金が発生することがあります。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】実行するための確認ポイント</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">まず2〜3ステップの最小フローで動作確認する</span>
<span class="advice-text">「まず動かす」ことが最優先。完成形を目指すのは安定稼働してからでOKです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">エラートリガーを設定し、Slack/メールに通知が来るか確認する</span>
<span class="advice-text">n8nは「Error Trigger」ノード、Makeは「エラーハンドラーモジュール」、Zapierは「Error Notifications」を設定します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">テストデータで10回以上の動作確認を行う</span>
<span class="advice-text">本番データを流す前に、テスト用データで繰り返し確認します。1〜2回の確認では不十分です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">本番データを最初は少量（5〜10件）で流す</span>
<span class="advice-text">いきなり大量処理をせず、少量から始めてエラーがないか確認してから増やします。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIの出力結果を手動で20%程度抜き打ちチェックする</span>
<span class="advice-text">ハルシネーション対策として、AI出力を全件信頼せず、一定割合を人間が確認する習慣をつけます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">APIの利用料金を週1回確認する</span>
<span class="advice-text">ChatGPT API・Claude APIは利用量に比例してコストが増えます。週1回は費用を確認しましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">フローに「人間の確認」が必要な箇所を明示する</span>
<span class="advice-text">外部送信（メール・Slack等）の前に確認ステップを入れることで、ハルシネーションによる誤情報送信を防ぎます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">接続している外部サービスの認証情報の有効期限を確認する</span>
<span class="advice-text">Gmail・Slack・Notionなどの連携認証は期限切れになることがあります。設定後に有効期限を確認しておきます。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】効果を最大化するためのチェック</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">プロンプトをテンプレート化してNotionやメモアプリに保存する</span>
<span class="advice-text">毎回ゼロから書くのは時間の無駄。使いまわせるテンプレートを蓄積することが「AI業務自動化の資産」になります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">2〜3のフローが安定したら、連携（パイプライン化）を検討する</span>
<span class="advice-text">個々のフローが安定してから、フロー同士をつなぐ「パイプライン化」に進みます。順番を守ることが重要です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">使用ツールのアップデート情報を月1回確認する</span>
<span class="advice-text">API仕様が変わるとフローが止まります。n8n・Make・ChatGPT APIの変更情報は月1回チェックしましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月次で「削減時間とコスト」を記録する</span>
<span class="advice-text">削減できた時間・コスト削減額を記録し、次の自動化範囲を拡大するかどうかの判断材料にします。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">同じ失敗を2回しないように「失敗ログ」をメモに残す</span>
<span class="advice-text">フローが止まった原因・解決法を記録することで、次回の対応が速くなり、同じ問題を繰り返さずに済みます。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
