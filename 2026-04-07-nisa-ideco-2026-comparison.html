<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新NISA・iDeCo 2026年改正対応チェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>新NISA・iDeCo 2026年改正対応チェックリスト</h1>
            <p class="subtitle">制度選択・配分確認・10年ルール対策を5分で確認する</p>
        </header>

        <div class="progress-text" id="progressText">0 / 19 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】始める前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分の企業年金の加入状況を確認する</span>
<span class="advice-text">会社の人事部・総務部に「企業型確定拠出年金（DC）」「確定給付年金（DB）」のどちらに加入しているか確認。iDeCoの掛金上限が変わります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">毎月の投資余力を計算する</span>
<span class="advice-text">手取り収入 − 固定費（家賃・保険・ローン等） − 生活費 − 生活防衛資金の積立 = 投資余力。正確な金額を把握してから配分を決める。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">生活防衛資金（生活費3〜6ヶ月分）が確保されているか確認する</span>
<span class="advice-text">iDeCoは60歳まで引き出せないため、緊急時の備えが先。この金額がない状態でiDeCo・NISAを始めると本末転倒になる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分の年収と所得税率を確認する</span>
<span class="advice-text">源泉徴収票の「給与所得控除後の金額」から課税所得を把握。年収330万円超〜695万円以下は所得税率20%が目安（実際は控除額により異なる）。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">iDeCoの現在の掛金上限を確認する</span>
<span class="advice-text">企業年金なし会社員は現在月23,000円、公務員は月12,000円が上限。2026年12月改正後の上限も確認しておく。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">NISAの残利用可能枠を確認する</span>
<span class="advice-text">金融機関のアプリ・サイトのNISA管理画面で「年間投資枠の残り」「生涯投資枠の残り」をチェック。つみたて枠120万円、成長投資枠240万円が上限。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">退職予定年齢をざっくり把握する</span>
<span class="advice-text">10年ルール（退職金とiDeCo一時金の間に10年以上空けると有利）の設計に必要。正確でなくていいので、60歳・65歳・70歳のどれに近いか把握する。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】配分を決めて手続きする</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">年収350万円以上の会社員はiDeCo優先かどうか判断する</span>
<span class="advice-text">年収350万円以上（所得税率10%以上）であればiDeCoの入口節税の恩恵が大きい。まずiDeCoを上限まで活用し、残りをNISAへ回す順番が基本。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">iDeCoの掛金を現在の上限まで増額する</span>
<span class="advice-text">月1万円しか入れていない人は、まず上限（会社員なら月23,000円）まで増額する手続きを行う。年間節税効果が数万円変わる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">2026年12月のiDeCo改正後の増額をスケジューリングする</span>
<span class="advice-text">2026年12月1日施行（2027年1月引落分から適用）で会社員の上限が月62,000円に。改正後すぐに掛金変更の手続きができるよう、今から手続き方法を確認しておく。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">iDeCoの運用商品の信託報酬（コスト）を確認する</span>
<span class="advice-text">信託報酬が年0.2%以下の商品を選ぶのが目安。証券会社のiDeCo管理画面で現在の運用商品を確認し、高コストの商品は低コストのインデックスファンドへのスイッチングを検討する。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">NISA口座の積み立て商品が低コストか確認する</span>
<span class="advice-text">つみたて投資枠はインデックスファンド（信託報酬0.1%以下）が基本。アクティブファンドや高コスト商品になっていないか確認する。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">10年ルールを踏まえてiDeCoの受取タイミングを仮設定する</span>
<span class="advice-text">退職予定年齢の前後10年を避けた時期にiDeCo一時金を受け取る計画を立てる。または年金受取に切り替えて公的年金等控除を使う選択肢も検討する。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】効果を最大化するためのチェック</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIシミュレーションで自分の最適配分を計算する</span>
<span class="advice-text">ChatGPTやClaude（無料版可）に「年収○円、年齢○歳、企業年金なし、月投資余力○万円」を入力してiDeCo・NISAの最適配分を試算してもらう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">iDeCoの受取方法（一時金 vs 年金）の税負担を比較する</span>
<span class="advice-text">一時金は退職所得控除、年金は公的年金等控除が使える。どちらが有利かは、退職金の額・受取タイミング・公的年金の見込み額によって変わる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">こどもNISA（2027年1月開始予定）の活用を検討する</span>
<span class="advice-text">0〜17歳の子どもがいる場合、子の名義で年間60万円（総額600万円上限）の非課税投資が可能になる予定。詳細は2026年中に確定するので、制度情報をウォッチしておく。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">NISAのポートフォリオをリバランス計画と合わせて確認する</span>
<span class="advice-text">2026年の改正で非課税枠が当年中に復活する予定。それを見据えて年内のリバランス計画を立てる。ただし、現時点ではまだ施行されていないため確認が必要。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">FPまたは税理士に1回相談するコスパを試算する</span>
<span class="advice-text">FPの無料相談（証券会社・保険会社経由）やスポット相談（1〜3万円）のコストと、最適化で得られる年間節税額を比較する。年間節税効果が5万円以上見込める場合はコスパが良い。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">老後の資産引き出し順序を仮設計する</span>
<span class="advice-text">①iDeCo一時金（10年ルールをクリアしたタイミング）→②NISA（必要に応じて柔軟に）→③公的年金の順番を基本として、自分のプランに当てはめる。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
