<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロボアドバイザー申込前チェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ロボアドバイザー申込前チェックリスト</h1>
            <p class="subtitle">ウェルスナビ・ROBOPRO・SBIラップ——自分に合う1社を30分で選ぶ</p>
        </header>

        <div class="progress-text" id="progressText">0 / 18 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】課金前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分のリスク許容度を確認する</span>
<span class="advice-text">「残高が20%下落しても5年間は引き出さずに続けられるか？」を自問してください。YESでなければ、ウェルスナビのリスク許容度「低」設定から始めることを検討しましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月々の積立予算を生活費とは切り離して決める</span>
<span class="advice-text">「余ったら積立」ではなく先に積立設定して残りで生活する「先取り貯蓄」形式にしてください。生活費から出すと急な出費で解約するリスクが高まります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">緊急予備費（生活費6ヶ月分）が別口座に確保されているか確認する</span>
<span class="advice-text">ロボアドバイザーは最低3年以上の継続が前提のサービスです。緊急予備費がない状態で始めると、急な出費のたびに解約→損失確定のリスクがあります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">投資期間の目標を設定する（最低3年、推奨10年以上）</span>
<span class="advice-text">ウェルスナビの実績では「3年以上運用者の98%がプラスリターン」。短期目的（2年以内に使う予定の資金）での運用には向いていません。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">NISA口座の開設状況を確認する</span>
<span class="advice-text">ウェルスナビとSBIラップはNISA対応、ROBOPROはNISA非対応です。NISA口座をどのサービスで使うかを先に決めてから申込みをしてください。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">各サービスの最低投資額を確認する</span>
<span class="advice-text">ウェルスナビ：1万円〜、SBIラップ：1万円〜、ROBOPRO：初期10万円（積立のみなら月1万円〜）。初期資金によって選択肢が変わります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分がメインで使っている証券口座を確認する</span>
<span class="advice-text">SBIラップはSBI証券の口座が必要です。別の証券会社をメインにしている場合、口座を追加することで管理が複雑になるリスクがあります。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】実行するための判断軸</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「安定型」か「積極型」かで方向性を決める</span>
<span class="advice-text">安定型ならウェルスナビ、コスト重視ならSBIラップ（SBI証券ユーザー向け）、下落耐性重視のサテライト運用ならROBOPROが大まかな目安です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ウェルスナビを使う場合は「おまかせNISA」を必ず設定する</span>
<span class="advice-text">口座開設しただけでは自動的にNISA口座が選択されません。アプリ内の「おまかせNISA」メニューから別途設定してください。設定忘れで課税口座で運用されるケースが多いです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">SBIラップを使う場合はSBI証券口座を先に開設する</span>
<span class="advice-text">SBI証券の口座がなければSBIラップは始められません。口座開設は無料で、本人確認書類さえあれば申込みができます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ROBOPROを使う場合はFOLIO証券口座を開設する</span>
<span class="advice-text">ROBOPROはFOLIO証券が提供するサービスです。初期投資の最低額は10万円。NISA非対応のため課税口座での運用になります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">積立設定後、最初の3ヶ月は残高が下落しても解約しないルールを自分に課す</span>
<span class="advice-text">下落時に積立を続けることで取得単価が下がる「ドルコスト平均法」の効果が出ます。最初の3ヶ月が心理的に最も解約したくなる時期です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">残高確認のルールを「月1回まで」と決める</span>
<span class="advice-text">頻繁に残高を確認するほど「売りたい衝動」が高まることが確認されています。アプリのホーム画面に残高が表示されないよう設定を変えるのも有効です。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】効果を最大化するためのチェック</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">年に1回、手数料を含めたネットリターンを計算し直す</span>
<span class="advice-text">各サービスのマイページで「トータルリターン」を確認。手数料は自動引き落としのため実感しにくいですが、長期では大きく影響します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">NISAのつみたて投資枠（年120万円）と成長投資枠（年240万円）の割り当てを設計する</span>
<span class="advice-text">ウェルスナビの「おまかせNISA」では自動で振り分けてくれますが、どちらの枠をどのサービスで使うかを把握していると、乗り換えや追加時に判断が早くなります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">インデックスファンド（eMAXIS Slim 全世界株式等）との組み合わせを検討する</span>
<span class="advice-text">ロボアドバイザーに全資金を集中させず、低コストのインデックスファンドを並行保有することで全体の平均手数料を下げることができます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">相場急落時の行動ルールを事前に書いておく</span>
<span class="advice-text">「残高が○%下がったら追加積立を検討する」「○年間は解約しない」などのルールを、相場が落ち着いているときに決めてメモしておいてください。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">2〜3年ごとに3サービスの手数料・実績を公式サイトで確認し直す</span>
<span class="advice-text">各サービスの運用方針や手数料は変更される可能性があります。定期的に比較し、自分に合うサービスを継続的に選び続けることが大切です。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
