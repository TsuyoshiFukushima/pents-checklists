<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成AI規制対応チェックリスト（日本・EU・韓国対応版）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>生成AI規制対応チェックリスト（日本・EU・韓国対応版）</h1>
            <p class="subtitle">「私の仕事は規制対象？」を10分で確認する</p>
        </header>

        <div class="progress-text" id="progressText">0 / 16 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】AI規制の現状把握と自分ごと化</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分が仕事で使っているAIツールを全部リストアップする</span>
<span class="advice-text">ChatGPT、Claude、Midjourney、Adobe Firefly等。ツール名と用途（文章生成／画像生成／リサーチ補助等）を記録します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">各AIツールの「商用利用可否」を利用規約で確認する</span>
<span class="advice-text">無料プランと有料プランで条件が異なる場合があります。ChatGPTは無料プランで学習データ使用のデフォルトがオンになっている場合があります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">現在取引しているクライアントの所在国を確認する</span>
<span class="advice-text">EU圏（ドイツ・フランス・スペイン等）や韓国が含まれている場合は、EU AI法・韓国AI基本法の域外適用リスクがあります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">日本のAI推進法7条「活用事業者の責務」の内容を一度確認する</span>
<span class="advice-text">e-gov.go.jpで「人工知能関連技術の研究開発及び活用の推進に関する法律」と検索すると原文が読めます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">内閣府の「プリンシプル・コード（仮称）」の最新状況を確認する</span>
<span class="advice-text">2026年内に正式版が策定される見込みです。内閣府知的財産戦略推進事務局のサイトで確認できます。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】今日から動ける対策を実行する</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">見積書・契約書にAI使用の開示文を追加する</span>
<span class="advice-text">「本業務では○○（ツール名）を補助的に使用します。最終確認・編集は担当者が行います。」という一文で十分です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">プロジェクトごとのAI使用記録シートを作る（Notionまたはスプレッドシート）</span>
<span class="advice-text">記録項目：案件名・使用ツール・使用目的・生成物の扱い（納品物に含む／含まない）。トラブル時の証跡になります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">著作権リスクの高い用途でAIを使っていないか確認する</span>
<span class="advice-text">実在キャラクターに類似した画像生成・著名アーティストのスタイル指定・書籍の丸ごとAI要約は要注意。商用利用では特に慎重に。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">機密情報をAIのプロンプトに入力していないか見直す</span>
<span class="advice-text">無料プランのツールは学習に使用される場合があります。クライアントの未公開情報・個人情報は入力しないことが原則です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">商用作業の画像生成にはAdobe Firefly等「権利クリア済み」ツールの使用を検討する</span>
<span class="advice-text">Adobeは学習データを権利クリア済みの画像のみに限定しています。著作権リスクを大幅に下げられます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">海外クライアント向けに英語の開示文（AI Use Disclosure）を用意する</span>
<span class="advice-text">例：「This project uses AI tools for research and drafting. All final edits are made by a human.」</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】先手を打って競合優位に変える</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分のポートフォリオサイト・プロフィールに「AI活用ポリシー」を掲載する</span>
<span class="advice-text">使用ツール・使用範囲・著作権への配慮を1ページで。EU圏クライアントへの信頼性が上がります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">EU圏クライアントとの契約に「準拠法と管轄裁判所」条項を入れる</span>
<span class="advice-text">争いになった場合に日本法が適用されるよう明示しておくことが重要です。法律事務所への相談を推奨。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">法律事務所の初回相談（30分）を活用して「自分の仕事が高リスクAIに該当するか」を確認する</span>
<span class="advice-text">初回無料〜5,000円程度で受けられる事務所が増えています。年1回の定期チェックが理想です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AI規制動向の情報源を1つ決めて週1回チェックする習慣をつける</span>
<span class="advice-text">e-gov.go.jp（法令データベース）または内閣府AI戦略本部のページを週1回確認するだけでOKです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「AIを使った自分の付加価値」を言語化して提案書に盛り込む</span>
<span class="advice-text">規制が強まる中で「AIを使いこなせる人間の判断力」が最大の差別化ポイントになります。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
