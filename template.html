<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{TITLE}}</h1>
            <p class="subtitle">{{SUBTITLE}}</p>
        </header>

        <div class="progress-text" id="progressText">0 / {{TOTAL_ITEMS}} 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        {{SECTIONS}}

        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
