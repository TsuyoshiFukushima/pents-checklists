<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI副業スタートチェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI副業スタートチェックリスト</h1>
            <p class="subtitle">稼げる副業の軌道に乗るための18のチェック</p>
        </header>

        <div class="progress-text" id="progressText">0 / 18 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】副業を始める前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">使うAIツールを1つに絞った</span>
<span class="advice-text">ChatGPT・Claude・Geminiのうち、最初は1つだけ。複数の使い分けは3ヶ月目以降でOK。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">副業のジャンルを1つ決めた</span>
<span class="advice-text">「何でも屋」にならないために、最初の3ヶ月は1ジャンル（例: 飲食店向けSNS投稿文）に絞る。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">クラウドワークスまたはランサーズのプロフィールを完成させた</span>
<span class="advice-text">専門ジャンル・使用ツール・対応成果物・納品スピードの4要素を必ず入れる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月収の3段階目標を設定した</span>
<span class="advice-text">第1目標（1〜2ヶ月目）: 月収1万円 / 第2目標（3〜4ヶ月目）: 月収3万円 / 第3目標（5〜6ヶ月目）: 月収5万円</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">フィードバックを記録するノートを準備した</span>
<span class="advice-text">NotionやGoogleドキュメントでOK。「何を指摘された・なぜ・次回どうする」の3列だけで十分。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AI出力の事実チェックを必ず行うと心に決めた</span>
<span class="advice-text">AIが生成する数値・固有名詞・制度名は必ず一次情報を確認する習慣を最初から持つ。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】受注〜納品を繰り返す中で行うこと</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">最初の10件に応募した（Week 1以内に実施）</span>
<span class="advice-text">採用率10〜20%が目安。2件採用されれば上々。条件を絞りすぎず動く。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">初納品で「3回の手直し」を実施した</span>
<span class="advice-text">①事実チェック ②トーン調整 ③自分の言葉で1文追加。この3ステップを毎回実施する。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">納品後に「改善点を教えてください」と一言添えた</span>
<span class="advice-text">このひと言がフィードバックを引き出し、クライアントとの信頼関係を作る。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">フィードバックをノートに記録した</span>
<span class="advice-text">修正依頼が来るたびにノートに書き留める。同じ指摘が3回続いたら意識的に改善する。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">クラウドソーシング以外のチャネルも1つ動かし始めた</span>
<span class="advice-text">noteで記事を書く・Xで専門知識を発信するなど、長期的な集客の土台を作る。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">週1本の受注ペースを最低ラインとして維持した</span>
<span class="advice-text">最初の2ヶ月間、週1本でも受注し続けることで実績と習慣ができる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">1ヶ月分の実績をまとめたポートフォリオを作った</span>
<span class="advice-text">noteで1ページ作り、実際に書いた記事のリンクをまとめる。プロフィールに掲載する。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】副業が軌道に乗り始めてから行うこと</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">マルチAI活用を試した（構成はChatGPT・執筆はClaude・SEOはGeminiなど）</span>
<span class="advice-text">それぞれのAIの得意領域を使い分けると、1ツール使用より成果物の質が上がる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分専用プロンプトライブラリをまとめた</span>
<span class="advice-text">うまくいったプロンプトをNotionに保存。10本以上溜まると初動が大幅に速くなる。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">単価交渉を1件試みた</span>
<span class="advice-text">文字単価0.5円から1.0円へ交渉する文例: 「実績が積み上がりましたので、次回から文字単価1.0円でご依頼いただけますでしょうか」</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">noteで有料コンテンツを1本出した</span>
<span class="advice-text">プロンプト集・チェックリスト・テンプレートなど、副業のノウハウを商品化する。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Xで専門ジャンルに関する発信を週3本以上続けた</span>
<span class="advice-text">フォロワー500人を目標に、専門性を継続発信することで直接問い合わせが来るようになる。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
