<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独学3ヶ月突破チェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>独学3ヶ月突破チェックリスト</h1>
            <p class="subtitle">独学エンジニアの90%が3ヶ月以内に消える理由を知り、設計を変えるための実践チェックリスト</p>
        </header>

        <div class="progress-text" id="progressText">0 / 19 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">学習目的を「何を作りたいか」で具体的に書き出す</span>
<span class="advice-text">「エンジニアになりたい」ではなく、作りたいものを先に決めると道筋が見えます（例：副業で月3万円・社内ツールの自動化・転職）</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ロードマップを1つだけ選び、他は見ない決意をする</span>
<span class="advice-text">ShiftBやRareTECHのロードマップから1つ選び、完遂するまで他のロードマップを参照しないのが重要です</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">学習記録のフォーマットを作る（インプット時間とアウトプット時間を分けて記録）</span>
<span class="advice-text">ExcelでもノーションでもGoogleスプレッドシートでも可。比率を記録するだけで意識が変わります</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">エラー記録帳を作る（詰まったエラーと解決法をメモする場所）</span>
<span class="advice-text">月に1回見返すと成長が可視化されます。Notionの1つのページでも十分です</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIへのエラー質問テンプレートを手元に保存する</span>
<span class="advice-text">「エラー文全文＋コード全体を貼り付けて初心者向けに説明を依頼する」が基本フォーマット</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">学習をXやZennで公開するアカウントを準備する（公開するかは後で決めてもOK）</span>
<span class="advice-text">「誰かに見られている感覚」だけで継続率が大幅に上がります</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">最初の2〜4週間はAIにコードを書かせない（概念理解と復習クイズには使う）</span>
<span class="advice-text">変数・関数・条件分岐・ループ・配列・オブジェクトの6つを自力で書けるまでは基礎優先</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">毎日のアウトプット比率を70%以上に維持する</span>
<span class="advice-text">1日2時間なら「インプット40分・アウトプット80分」が目安。コロンビア大学の実験で証明された黄金比です</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">週次マイルストーンを設定する（今週中に◯◯を実装する、という具体的なゴール）</span>
<span class="advice-text">「大きな目標は方向性として持ち、実際に追いかけるのは1週間単位の小さなゴールだけ」が挫折防止の基本</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">エラーが出たら「5分自力→AIに質問→自分で修正→1行メモ」の手順を守る</span>
<span class="advice-text">コピペせず自分で直す習慣が、後から大きな実力の差になります</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">チュートリアルを始める前に「終わったら何を作るか」を決める</span>
<span class="advice-text">チュートリアル地獄防止の最重要ポイント。先にゴールを決めると学習が「目的のための手段」になります</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">毎週末にインプット：アウトプット比率を確認し、50%超えていたら翌週修正する</span>
<span class="advice-text">比率の記録と週次確認だけで、自然と理想的な学習スタイルに近づきます</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">平日に「10分だけ昨日のコードを読み返す」習慣をつける（週末集中型の場合）</span>
<span class="advice-text">週末の「思い出し時間」を大幅に短縮でき、連続性が保たれます</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">学習3ヶ月を超えたら「模倣→改造→創造」の3段階を意識する</span>
<span class="advice-text">既存コードを写経→一部を自分流に改造→全て自作の順番が、最も確実な実力定着の方法です</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">週1回「今週学んだことを5分で言語化する」習慣をつける</span>
<span class="advice-text">Zennやnoteへの公開でも、ローカルのメモでも構いません。自分の言葉で説明できるか確認する工程が大事</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">コードを書いたらAIにコードレビューを依頼する</span>
<span class="advice-text">「バグ・読みやすさ・パフォーマンス」の3観点でレビューを依頼すると悪い習慣を早期に矯正できます</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月に1回「過去に詰まったエラー集」を見返す</span>
<span class="advice-text">「昔詰まったやつが今は秒で解決できる」という体験が、自分の成長を可視化する最も簡単な方法です</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「公開するための成果物」を常に1つ持ち、週次締め切りを設定する</span>
<span class="advice-text">GitHubやVercelに公開するとフィードバックをもらえることがあり、それが次の学習の原動力になります</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">プログラミング学習コミュニティに参加する</span>
<span class="advice-text">ShiftBのSlackやDiscordコミュニティなど。孤独な独学の「孤独感」を和らげるだけで継続率が大幅に上がります</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
