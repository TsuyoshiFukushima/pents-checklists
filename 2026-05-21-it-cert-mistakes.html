<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT資格攻略チェックリスト【2026年版】</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IT資格攻略チェックリスト【2026年版】</h1>
            <p class="subtitle">後悔しない資格取得のための全18項目</p>
        </header>

        <div class="progress-text" id="progressText">0 / 18 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「3ヶ月後にどんな仕事をしたいか」を具体的に書き出す</span>
<span class="advice-text">資格の目的を明確にする第一歩。「クラウド案件を取りたい」「転職でIT職に就きたい」など動詞で書くと明確になります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">目標の仕事・案件の求人票・案件票を10件チェックし、資格名が要件に含まれているか確認する</span>
<span class="advice-text">資格の「市場需要」を自分で確かめる作業。10件のうち3件以上に記載があれば取得を検討する価値があります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">合格体験記を5本以上読み、実際の学習時間を平均する</span>
<span class="advice-text">公式の「目安時間」より体験記の実数値の方が信頼性が高い。平均値に1.3倍した数字を自分の計画に使いましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自分のスケジュールに学習時間を割り当て「本当に間に合うか」を検証する</span>
<span class="advice-text">週に確保できる時間 × 受験日まての週数 > 必要学習時間、になることを確認してから申し込む。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">IPA公式サイト(ipa.go.jp)で受験する試験の最新スケジュールを確認する</span>
<span class="advice-text">2026年度からCBT方式移行・前期後期制に変更。受験日程・申込期間が従来と大きく変わっています。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">受験料・教材費・学習時間（時給換算）の合計コストを計算しておく</span>
<span class="advice-text">ITパスポート・基本情報は各7,500円。AWS SAAは約1.5〜2万円（為替変動あり）。総コストを把握してから始めましょう。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">先に受験日を予約して「締め切り」を自分で作る</span>
<span class="advice-text">学習開始から6〜8週間後の日程をCBTの予約サイトで先に押さえる。締め切りがないと学習が後回しになりやすいです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">公式過去問を1年分解いて、苦手分野を特定する</span>
<span class="advice-text">IPA試験は公式サイトで過去問が無料公開されています。まず1年分を解いて得点分布を把握しましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIを使って苦手分野を対話式で学習する</span>
<span class="advice-text">ClaudeやChatGPTに「○○分野の問題を5問出して」とプロンプトを送り、間違えたら「なぜ間違えたか解説して」と続ける。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">週1回、学習進捗を確認して計画を微調整する</span>
<span class="advice-text">「週10時間の予定が5時間しかできなかった」なら翌週の予定を組み直す。遅れに気づくのが早いほど対処しやすい。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">試験1週間前に「間違えた問題リスト」を整理して集中復習する</span>
<span class="advice-text">間違えた問題だけをまとめたノート（またはスプレッドシート）を作っておくと、直前の集中復習が効率化されます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">試験当日、CBTの「フラグ機能」を活用して分からない問題は後回しにする</span>
<span class="advice-text">一問に悩みすぎると時間が足りなくなる。フラグを立てて先に進み、一通り終わってから戻る順序がおすすめ。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">合格後48時間以内に「次のアクション」を一つ実行する</span>
<span class="advice-text">職務経歴書への追記・クラウドサービスでのハンズオン・次の目標資格の学習開始など。合格の達成感で止まらないことが最重要。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">職務経歴書に「資格名＋使った経験（実績）」をセットで記載する</span>
<span class="advice-text">「AWS SAA保有」だけでなく「AWS SAA保有・EC2/RDSを使った小規模システム設計の経験あり」のように実績とセットで書く。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">合格後すぐに実務で使える小さなハンズオンを1つ始める</span>
<span class="advice-text">AWSなら無料枠でEC2インスタンスを立てる。基本情報なら業務フローの問題点を1つ可視化する。資格知識を行動に変える。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">SNSや社内で学んだことを発信する（アウトプットで定着させる）</span>
<span class="advice-text">Xで「○○を学んだ」と投稿するだけでも定着に効果あり。発信すると同じ目標の人から反応が来て、モチベーション維持にもつながります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">取得した資格の「更新要件」を確認しておく</span>
<span class="advice-text">AWS認定資格は3年ごとの更新が必要。更新を忘れると資格が失効するので、カレンダーに更新期限を登録しておきましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">次のキャリアターゲットに必要な資格・スキルを洗い出す</span>
<span class="advice-text">現在の資格をスタート地点として、6ヶ月後・1年後の目標を見直す。キャリアのロードマップを常に1〜2歩先まで考えておく。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
