<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI投資分析 実践チェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI投資分析 実践チェックリスト</h1>
            <p class="subtitle">Perplexity・Claude・ChatGPTで株分析する前に確認する全ステップ</p>
        </header>

        <div class="progress-text" id="progressText">0 / 16 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】分析を始める前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">無料のPerplexity AI（perplexity.ai）のアカウントを登録する</span>
<span class="advice-text">Googleアカウントでログインするだけ。追加設定不要で2分で使い始められます。Pro版不要、無料版でOK。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ChatGPTのアカウントを確認する（Deep Research機能を使う場合はPlus月額約3,200円が必要）</span>
<span class="advice-text">銘柄情報の収集だけならChatGPT無料版でも対応可。Deep Researchを使うとき初めてPlusが必要になります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">分析したい銘柄を1〜3つ具体的に決める</span>
<span class="advice-text">まず自分がよく知っている業界の会社から始めると判断しやすい。「よく買う商品の会社」など身近な企業がおすすめ。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">気になる銘柄のIRページのURLを確認し、決算短信PDFの場所を把握する</span>
<span class="advice-text">企業名＋「IR情報」で検索するとコーポレートサイトのIRページが見つかります。「決算短信」または「決算説明資料」を探してください。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">比較したいライバル企業を1〜2社選んでおく</span>
<span class="advice-text">「〇〇 競合他社」とPerplexityに聞くと教えてくれます。同業種の上場企業を選ぶのが基本。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】3段階AIフローを実行する</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Perplexityで「[銘柄名] 2026年 最新ニュース 業績 競合」と検索し、主要な動向を把握する（10分以内）</span>
<span class="advice-text">出典付きで情報を出してくれるのがPerplexityの強み。情報源のURLをメモしておくと後で確認できます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">あえて「[銘柄名] リスク 懸念点 問題点 批判」とネガティブ面を先に調べる</span>
<span class="advice-text">ポジティブな情報より先にリスクを調べることで、自分の確証バイアスを防ぎます。これがプロの習慣。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ClaudeにIR資料のPDFをアップロードし「投資家視点でリスク3点・成長機会3点を数値根拠と共に整理して」と依頼する</span>
<span class="advice-text">ClaudeはPDF読解が特に強い。無料版でも1ファイルなら対応できます。Claude Proは月額$20で大きなPDFも可。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Claudeが出した数値を決算短信の原文と照合して正確性を確認する</span>
<span class="advice-text">この作業は省略禁止。特にROE・PER・EPS等の数値はAIが幻覚を起こしやすい。公式IRで必ず裏取りを。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ChatGPTで「楽観シナリオ・悲観シナリオ」を作成してもらい、投資判断の材料にする</span>
<span class="advice-text">AIに答えを出させるのではなく、材料を整理させる。この視点の転換が全ての出発点です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIが出した分析結果と自分の投資判断をメモに残す</span>
<span class="advice-text">後で振り返ることで自分の投資判断のクセが見えてきます。NotionやObsidianへの保存がおすすめ。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】習慣化して投資力を高める</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「この銘柄を買うべきではない理由を10個挙げて」とAIに反論させてみる</span>
<span class="advice-text">自分のバイアスを発見するための最重要チェック。最低でも1回は必ず実行すること。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">保有銘柄の決算発表・業績修正アラートをYahoo!ファイナンス等で設定する</span>
<span class="advice-text">アラートが届いたらすぐにPerplexity→Claude→ChatGPTの3段階フローを回す習慣をつけます。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月1回、全保有銘柄についてAIに「今月特に注意すべき業界の変化はあったか？」と聞く</span>
<span class="advice-text">保有銘柄名と業種を一括で伝えれば、複数銘柄をまとめて確認できます。10〜15分で完了。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">AIとの投資分析対話ログを日記として記録・保存する</span>
<span class="advice-text">3ヶ月分貯まると自分の投資バイアスのパターンが見えてきます。意思決定の記録として残してください。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">半年に1回、AIを使った投資判断の結果（当たった・外れた）を振り返る</span>
<span class="advice-text">AIを使った分析の精度を自分で評価して使い方を改善していくサイクルが長期的な投資力向上につながります。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
