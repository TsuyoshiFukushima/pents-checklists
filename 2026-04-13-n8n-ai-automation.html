<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n×AI自動化スタートチェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>n8n×AI自動化スタートチェックリスト</h1>
            <p class="subtitle">「AI補助の手作業」を卒業して月40時間を取り戻す18のステップ</p>
        </header>

        <div class="progress-text" id="progressText">0 / 18 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】課金・セットアップ前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自動化したい作業をリストアップし「現在の所要時間 × 月の実施回数」で記録する</span>
<span class="advice-text">時間コストが大きい順に並べ替えると、どこから自動化すべきかが見えてくる</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">n8nのアカウントを作成する（n8n.ioでメールアドレス登録・14日無料トライアル）</span>
<span class="advice-text">クレジットカード不要。まずクラウド版で始めると設定が最もシンプル</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自動化に使うサービス（Gmail/Slack/Notion等）の管理者権限が自分にあることを確認する</span>
<span class="advice-text">組織アカウントの場合、OAuth認証に管理者許可が必要なことがある</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">OpenAI（またはClaude/Gemini）のAPIキーを取得し、APIダッシュボードで月次上限額を設定する</span>
<span class="advice-text">OpenAIはUsage limitを月500〜1,000円に設定しておくと使いすぎを防止できる</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">自動化する作業のトリガー（メール受信/時刻指定/ファイル追加）を特定する</span>
<span class="advice-text">「いつ、何をきっかけに起動するか」を先に決めておくとワークフロー設計が早い</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">テスト用のGmail/Slackアカウントまたはテスト用チャンネルを用意する</span>
<span class="advice-text">本番環境で誤送信しないよう、必ずテスト環境を先に用意する</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】ワークフロー構築の実行手順</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">n8nのCredentials画面でGmailのOAuth認証を設定する</span>
<span class="advice-text">Credentials → Add credential → Gmail → Sign in with Googleの順で進む</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Slack APIページでBot Tokenを作成し、chat:writeスコープを付与する</span>
<span class="advice-text">api.slack.com/appsからアプリを新規作成 → OAuth & Permissions → Install to Workspace</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">新規ワークフローを作成し、Gmail Trigger + Slackの3ノード以内でまず1本完成させる</span>
<span class="advice-text">ノード数3つ以内でまず1本完成させることが重要。完璧主義は禁物</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">ワークフローのTest Workflowボタンで動作確認してからActiveにする</span>
<span class="advice-text">特にメール送信系は必ずテスト実行してからActivateすること</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Error Triggerノードを起点にしたエラー監視ワークフローを1つ作成する</span>
<span class="advice-text">エラーが起きたらSlackに通知するワークフローを作っておくと見逃しがなくなる</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">1週間稼働後にOpenAI/AnthropicダッシュボードでAPIコストを確認する</span>
<span class="advice-text">想定外のAPI呼び出しが起きていないか週次で確認する習慣をつける</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Autosave機能がオンになっていることを確認する</span>
<span class="advice-text">2026年版n8nではAutosaveがデフォルトで有効。念のため設定を確認</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】自動化を深める上級チェック</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Human-in-the-Loop設定を有効にして、外部送信系ワークフローに承認ステップを追加する</span>
<span class="advice-text">2026年から正式対応。クライアントへのメールや公開SNS投稿には必ず設定</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">サブワークフローを使って複数のAIを連携させるマルチエージェント構成を試す</span>
<span class="advice-text">「メール分類AI」「返信ドラフトAI」を別々に作って連携させると安定性が高まる</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">Webhookトリガーを設定して、外部フォームやAPIからn8nを起動できるようにする</span>
<span class="advice-text">GoogleフォームやTypeformと組み合わせるとリード管理の自動化が大幅に広がる</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">n8nのワークフローをJSONエクスポートして週次でGoogle Driveにバックアップする</span>
<span class="advice-text">バックアップ自体もn8nのワークフローで自動化するとなお良し</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">月次で自動化の効果（節約時間・節約コスト）を集計して記録する</span>
<span class="advice-text">「どの自動化が一番効いているか」を可視化すると次の自動化対象の選定に役立つ</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
