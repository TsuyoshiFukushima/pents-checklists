<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>副業税務テクニック実践チェックリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --title-color: #1a1a2e;
            --text-color: #333333;
            --advice-color: #555555;
            --prep-bg: #f0f4f8;
            --practice-bg: #fdf2f2;
            --apply-bg: #f0fdf4;
            --accent-color: #1a1a2e;
        }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", "Arial", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #ffffff;
            margin: 40px 20px;
            padding: 60px 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }
        h1 { color: var(--title-color); font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { font-size: 1.1rem; color: var(--advice-color); font-weight: 400; }
        section { margin-bottom: 30px; padding: 30px; border-radius: 12px; }
        .section-prep { background-color: var(--prep-bg); }
        .section-practice { background-color: var(--practice-bg); }
        .section-apply { background-color: var(--apply-bg); }
        h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--title-color);
        }
        h2::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 24px;
            background-color: var(--accent-color);
            margin-right: 15px;
            border-radius: 2px;
        }
        .checklist-item { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 4px; }
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        input[type="checkbox"]:checked { background-color: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 16px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
        .content-wrapper { flex: 1; }
        .item-text { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .advice-text {
            display: block;
            font-size: 0.9rem;
            color: var(--advice-color);
            background: rgba(255,255,255,0.5);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #ccc;
        }
        .footer-note { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #999; }
        .progress-bar-wrap { background: #e0e0e0; border-radius: 8px; height: 10px; margin-bottom: 30px; }
        .progress-bar { background: var(--accent-color); height: 10px; border-radius: 8px; transition: width 0.4s; }
        .progress-text { text-align: center; font-size: 0.9rem; color: var(--advice-color); margin-bottom: 20px; }
        @media print {
            body { background-color: white; }
            .container { box-shadow: none; margin: 0; max-width: 100%; padding: 40px 60px; }
            .no-print { display: none; }
            section { break-inside: avoid; border: 1px solid #eee; }
        }
        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
        .btn-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-print:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>副業税務テクニック実践チェックリスト</h1>
            <p class="subtitle">プロが実践する5つの節税手法を確定申告前に漏れなく確認する</p>
        </header>

        <div class="progress-text" id="progressText">0 / 18 完了</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

        
<section class="section-prep">
<h2>【準備編】課金前に確認すること</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">freee開業またはe-Taxで「個人事業の開業届出書」を提出する</span>
<span class="advice-text">副業を始めたら早めに提出。費用0円・5分でオンライン申請可。翌年以降の節税に直結します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">「青色申告承認申請書」を開業日から2ヶ月以内（または前年12月末まで）に提出する</span>
<span class="advice-text">適用を受けたい年の前年12月31日までに提出が必要。この手続きなしでは65万円控除が受けられません。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">マネーフォワード・freee・やよいの青色申告のいずれかで会計ソフトを契約して帳簿をつけ始める</span>
<span class="advice-text">月額980円〜。銀行口座・カードと連携させると入力作業が大幅に減ります。帳簿保存が事業所得認定の鍵です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">副業専用の銀行口座とクレジットカードを開設する</span>
<span class="advice-text">プライベートと完全に分けることで会計処理が格段に楽になります。無料口座・年会費無料カードでOKです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">副業に使う主要な経費項目と家事按分の利用割合を一覧にする</span>
<span class="advice-text">通信費（按分割合）・家賃（面積割合）・交通費など、事前にリスト化しておくと申告時に漏れが少なくなります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">確定申告の期限（毎年2月16日〜3月15日）と必要書類をカレンダーに登録する</span>
<span class="advice-text">12月から準備を始めると余裕が持てます。期限ギリギリの申告はミスが起きやすいです。</span>
</div></label>

</section>
<section class="section-practice">
<h2>【実践編】実行するための判断軸</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">確定申告書の住民税欄で「自分で納付（普通徴収）」を選択する</span>
<span class="advice-text">確定申告書第二表の「住民税に関する事項」欄で選択。副業分の住民税通知が自宅に届くようになります。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">家賃の家事按分計算を行い、根拠（部屋の面積メモ）を保存する</span>
<span class="advice-text">計算式：月額家賃×（副業スペース面積÷全床面積）。税務調査に備えて計算根拠を書面で残しておきましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">スマホ・インターネット料金の業務利用割合を算出して按分計算する</span>
<span class="advice-text">1日の業務使用時間÷全使用時間で割合を算出。30〜50%が合理的な目安として認められやすいです。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">e-Taxでの電子申告設定を完了する（マイナンバーカードまたはID・パスワード方式）</span>
<span class="advice-text">e-Tax申告は青色申告65万円控除の適用条件のひとつ。事前に設定・動作確認をしておきましょう。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">会計ソフトで青色申告決算書（損益計算書・貸借対照表）を作成する</span>
<span class="advice-text">マネーフォワードやfreeeなら、日々の記帳から自動で決算書が生成されます。難しい作業は不要です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">申告後に翌年のために経費記録フォルダ（領収書・按分計算メモ）を整備する</span>
<span class="advice-text">年度ごとにフォルダを作り、領収書の写真・経費一覧・按分計算メモを保存する習慣をつけましょう。</span>
</div></label>

</section>
<section class="section-apply">
<h2>【応用編】効果を最大化するためのチェック</h2>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">iDeCoの現在の掛金を確認し、加入区分の上限まで増額を検討する</span>
<span class="advice-text">自営業・専業フリーランスは月額68,000円まで。会社員の場合は勤務先の年金制度によって上限が異なります。必ず確認を。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">小規模企業共済への加入可否を中小企業基盤整備機構に確認する</span>
<span class="advice-text">開業届を出している個人事業主の場合、加入できる可能性があります。掛金は月最大70,000円、全額所得控除です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">副業赤字が発生した場合に損益通算が適用可能か、帳簿保存状況と所得区分を確認する</span>
<span class="advice-text">事業所得として認められていることが前提。帳簿保存がない雑所得では損益通算はできません。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">純損失の繰越控除制度を活用するため、過去3年分の確定申告書を確認する</span>
<span class="advice-text">過去に副業赤字があった年がある場合、翌年以降の黒字と相殺できます。青色申告者のみ適用可能です。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">副業専用クレジットカードを会計ソフトに連携し、自動仕訳の設定を完了する</span>
<span class="advice-text">手動入力をゼロにすることが目標。連携後は月次で「未確定仕訳の確認」だけで記帳が完了します。</span>
</div></label>
<label class="checklist-item">
<div class="checkbox-wrapper"><input type="checkbox"></div>
<div class="content-wrapper">
<span class="item-text">年末に年間節税効果を試算し、来年度の改善ポイントを1つ決める</span>
<span class="advice-text">「今年は家事按分を始めた。来年はiDeCoを増額する」という形で毎年1つ改善を積み上げましょう。</span>
</div></label>

</section>


        <div class="footer-note">© ぺんつ - 特典チェックリスト</div>
    </div>

    <button class="btn-print no-print" onclick="window.print()">PDFとして保存 / 印刷</button>

    <script>
        const STORAGE_KEY = 'checklist_' + location.pathname;
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;

        // 保存済み状態を復元
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        checkboxes.forEach((cb, i) => {
            if (saved[i]) cb.checked = true;
        });
        updateProgress();

        // 変更時に保存
        checkboxes.forEach((cb, i) => {
            cb.addEventListener('change', () => {
                saved[i] = cb.checked;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                updateProgress();
            });
        });

        function updateProgress() {
            const done = [...checkboxes].filter(cb => cb.checked).length;
            document.getElementById('progressText').textContent = done + ' / ' + total + ' 完了';
            document.getElementById('progressBar').style.width = (done / total * 100) + '%';
        }
    </script>
</body>
</html>
